<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact our media production company for professional services.">

    <title>Contact Us</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header class="container">
        <h1>Media Production Company</h1>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="media.html">Media</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="contact container">
            <h2>Get In Touch</h2>

            <form action="#" method="post">

                <!-- PERSONAL INFO -->
                <fieldset>
                    <legend>Personal Information</legend>

                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required minlength="2">

                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>

                    <label for="date">Preferred Contact Date:</label>
                    <input type="date" id="date" name="date" required>
                </fieldset>

                <!-- SERVICE TYPE -->
                <fieldset>
                    <legend>Service Required</legend>

                    <label>
                        <input type="radio" name="service" value="video" required>
                        Video Production
                    </label>

                    <label>
                        <input type="radio" name="service" value="audio">
                        Audio Production
                    </label>

                    <label>
                        <input type="radio" name="service" value="editing">
                        Editing Services
                    </label>
                </fieldset>

                <!-- MESSAGE -->
                <fieldset>
                    <legend>Your Message</legend>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" required minlength="10"></textarea>
                </fieldset>

                <!-- SUBMIT -->
                <button type="submit">Submit</button>

            </form>
        </section>

    </main>

    <footer class="container">
        <p>Email: contact@mediaproduction.com</p>
        <p>Phone: 555-0123</p>
    </footer>

</body>
</html>
